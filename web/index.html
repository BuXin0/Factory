<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生产流程控制系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- 页面内容将动态加载到这里 -->
  </div>

  <!-- 全局提示 -->
  <div id="toast" class="toast">
    <span id="toast-icon"></span>
    <span id="toast-message"></span>
  </div>

  <!-- 确认对话框 -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <h3 id="modal-title"></h3>
      <p id="modal-content"></p>
      <div class="modal-buttons">
        <button id="modal-cancel" class="btn btn-secondary">取消</button>
        <button id="modal-confirm" class="btn btn-primary">确定</button>
      </div>
    </div>
  </div>

  <!-- 底部导航（仅在登录后显示） -->
  <nav id="tab-bar" class="tab-bar hidden">
    <a href="#home" class="tab-item" data-page="home">
      <span class="tab-icon">🏠</span>
      <span class="tab-text">首页</span>
    </a>
    <a href="#process" class="tab-item" data-page="process">
      <span class="tab-icon">📋</span>
      <span class="tab-text">流程</span>
    </a>
    <a href="#logs" class="tab-item" data-page="logs">
      <span class="tab-icon">📝</span>
      <span class="tab-text">日志</span>
    </a>
  </nav>

  <!-- 脚本文件 -->
  <script src="utils/constants.js"></script>
  <script src="utils/store.js"></script>
  <script src="utils/router.js"></script>
  <script src="pages/auth/auth.js"></script>
  <script src="pages/home/home.js"></script>
  <script src="pages/process/process.js"></script>
  <script src="pages/logs/logs.js"></script>
  <script src="pages/admin/admin.js"></script>
  <script src="pages/monitor/monitor.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
